name: install-pip-deps
description: Clone python-greetings repo, create virtual environment and install dependencies

inputs:
  app_path:
    required: true

runs:
  using: "composite"
  steps:
    - name: Clone python-greetings repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: ${{ inputs.app_path }}

    - name: Print info
      shell: cmd
      run: echo Installing all required dependencies...

    - name: Create virtual environment
      shell: cmd
      working-directory: ${{ inputs.app_path }}
      run: python -m venv venv

    - name: Install requirements
      shell: cmd
      working-directory: ${{ inputs.app_path }}
      run: |
        venv\Scripts\python -m pip install --upgrade pip
        venv\Scripts\python -m pip install -r requirements.txt